name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CI: "true"
  DATABASE_URL: postgresql://warehouse:warehouse@127.0.0.1:5432/warehouse?schema=public
  REDIS_URL: redis://127.0.0.1:6379
  SESSION_SECRET: ci-session-secret-with-at-least-32-characters

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: docker compose config --quiet
      - run: corepack pnpm lint
      - run: corepack pnpm typecheck
      - run: corepack pnpm test
      - run: corepack pnpm build

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: warehouse
          POSTGRES_USER: warehouse
          POSTGRES_PASSWORD: warehouse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U warehouse -d warehouse"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm prisma:migrate:verify
      - run: corepack pnpm prisma:migrate:deploy
      - run: corepack pnpm prisma:seed
        env:
          DEV_ADMIN_PASSWORD: ChangeMe123!
      - run: corepack pnpm test:integration
        env:
          DEV_ADMIN_PASSWORD: ChangeMe123!

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm audit --audit-level high
      - uses: gitleaks/gitleaks-action@v2
